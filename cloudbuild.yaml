options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: test
    name: golang:1.26
    entrypoint: go
    args: ["build", "./..."]

  - id: build
    name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_URI}", "."]

  - id: push
    name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE_URI}"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE_NAME}
      - --image=${_IMAGE_URI}
      - --region=${_REGION}
      - --platform=managed
      - --add-cloudsql-instances=low-carbon-491109:southamerica-east1:low-carbon-postgres
      - --set-env-vars=DATABASE_URL=postgres://lowcarbon:LowCarbonDB2026!@/notification?host=/cloudsql/low-carbon-491109:southamerica-east1:low-carbon-postgres&sslmode=disable,REDIS_ADDR=10.196.131.139:6379,JWT_SECRET=super-secret-jwt-key-change-in-production-2026
      - --service-account=low-carbon-notification-service-sa@low-carbon-491109.iam.gserviceaccount.com

substitutions:
  _REGION: southamerica-east1
  _SERVICE_NAME: low-carbon-notification-service
  _IMAGE_URI: southamerica-east1-docker.pkg.dev/low-carbon-491109/low-carbon/notification-service:${SHORT_SHA}
